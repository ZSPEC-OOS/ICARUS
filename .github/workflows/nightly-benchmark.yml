name: Nightly Benchmark Suite

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run nightly benchmark suite
        run: node scripts/run-benchmarks.mjs --out-dir .logik/benchmarks --suite-version nightly-${{ github.run_number }}

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-${{ github.run_number }}
          path: .logik/benchmarks/
