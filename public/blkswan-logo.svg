<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40" role="img" aria-label="BLKSWAN">
  <!-- Swan icon -->
  <g>
    <!-- Wing feathers (electric blue, fanning left) -->
    <path d="M7,34 C9,26 15,19 22,16" stroke="#4d9cff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M4,35 C7,28 13,21 19,18" stroke="#4d9cff" stroke-width="1.9" fill="none" stroke-linecap="round" opacity="0.72"/>
    <path d="M2,37 C5,31 10,25 16,22" stroke="#4d9cff" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.50"/>
    <path d="M2,39 C5,34 9,30 13,27" stroke="#4d9cff" stroke-width="1.0" fill="none" stroke-linecap="round" opacity="0.32"/>
    <!-- Swan body (white, slightly transparent) -->
    <ellipse cx="20" cy="26" rx="9" ry="5.5" fill="white" fill-opacity="0.18" transform="rotate(-12,20,26)"/>
    <!-- Swan neck arc -->
    <path d="M24,20 C27,14 27,9 25,6" stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Swan head -->
    <circle cx="24.5" cy="5" r="3.2" fill="white"/>
    <!-- Beak -->
    <path d="M27.5,4 L32,5.2 L27.5,6.4" fill="#4d9cff" stroke="#4d9cff" stroke-width="0.3" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="25.8" cy="4.4" r="0.9" fill="#030b18"/>
    <!-- Subtle wing body highlight -->
    <path d="M22,16 C19,18 16,22 14,26" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.30"/>
  </g>

  <!-- Wordmark -->
  <!-- "BLK" in white -->
  <text
    x="42" y="29"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="23"
    fill="#ffffff"
    letter-spacing="0.5"
  >BLK</text>
  <!-- "SWAN" in electric blue -->
  <text
    x="104" y="29"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="23"
    fill="#4d9cff"
    letter-spacing="0.5"
  >SWAN</text>
</svg>
